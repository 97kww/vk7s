<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050507" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Perfil | VkBoyzão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ══════════════════════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════════════════════ */
    :root {
      --bg:           #060608;
      --bg2:          #0b0b0f;
      --surface:      rgba(255,255,255,0.032);
      --surface-hov:  rgba(255,255,255,0.06);
      --border:       rgba(255,255,255,0.07);
      --border-hov:   rgba(255,255,255,0.16);
      --text:         #eeeef2;
      --text-dim:     rgba(238,238,242,0.38);
      --text-dimmer:  rgba(238,238,242,0.18);
      --red:          #d63031;
      --red-dim:      rgba(214,48,49,0.14);
      --red-glow:     rgba(214,48,49,0.25);
      --green:        #1db954;
      --green-dim:    rgba(29,185,84,0.13);
      --green-glow:   rgba(29,185,84,0.28);

      --r-card:   40px;
      --r-pill:   999px;
      --r-player: 24px;
      --r-btn:    14px;

      --ease:     cubic-bezier(0.22, 1, 0.36, 1);
      --t-fast:   0.16s;
      --t-mid:    0.32s;
      --t-slow:   0.6s;

      --blur:     28px;
      --blur-hvy: 52px;

      --card-w:   370px;
      --player-w: 310px;
    }

    /* ══════════════════════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Ambient background gradients ───────────────────── */
    .bg-wash {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(150,12,12,0.26) 0%, transparent 65%),
        radial-gradient(ellipse 55% 65% at 88% 75%, rgba(70,5,5,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 90% 90% at 50% 50%, rgba(0,0,0,0.55) 0%, rgba(6,6,8,0.96) 100%);
    }

    /* ── Canvas particles ────────────────────────────────── */
    #canvas {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    /* ══════════════════════════════════════════════════════════
       ENTRY OVERLAY
    ══════════════════════════════════════════════════════════ */
    #entry {
      position: fixed; inset: 0;
      background: rgba(6,6,8,0.85);
      backdrop-filter: blur(var(--blur-hvy)) saturate(120%);
      -webkit-backdrop-filter: blur(var(--blur-hvy)) saturate(120%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: opacity var(--t-slow) var(--ease), visibility var(--t-slow);
    }

    #entry.gone {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .entry-ring {
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 1px solid rgba(214,48,49,0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulseRing 2.6s ease-in-out infinite;
      position: relative;
    }

    .entry-ring::before {
      content: '';
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(214,48,49,0.10);
      animation: pulseRing 2.6s ease-in-out infinite 0.4s;
    }

    .entry-ring i { font-size: 1.4rem; color: var(--red); }

    @keyframes pulseRing {
      0%,100% { transform: scale(0.90); opacity: 0.35; box-shadow: 0 0 0 0 var(--red-glow); }
      50%     { transform: scale(1);   opacity: 1;    box-shadow: 0 0 32px 10px var(--red-glow); }
    }

    .entry-label {
      font-family: 'Syne', sans-serif;
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 9px;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.45;
    }

    /* ══════════════════════════════════════════════════════════
       MAIN LAYOUT WRAPPER
    ══════════════════════════════════════════════════════════ */
    .page-wrap {
      position: relative; z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 16px 0 160px;
      width: 100%;
      overflow-y: auto;
      max-height: 100dvh;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .page-wrap::-webkit-scrollbar { display: none; }

    /* ══════════════════════════════════════════════════════════
       PROFILE CARD
    ══════════════════════════════════════════════════════════ */
    .card {
      width: min(var(--card-w), 92vw);
      background: var(--surface);
      backdrop-filter: blur(var(--blur)) saturate(160%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(160%);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 50px 22px 36px;
      text-align: center;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.025) inset,
        0 1px 0 rgba(255,255,255,0.065) inset,
        0 72px 160px rgba(0,0,0,0.95),
        0 28px 64px rgba(0,0,0,0.70),
        0 0 0 0.5px rgba(214,48,49,0.06);
      animation: cardIn var(--t-slow) var(--ease) both;
      position: relative;
      overflow: hidden;
    }

    /* Subtle top edge shimmer */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      pointer-events: none;
    }

    /* Red bottom-corner glow */
    .card::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(214,48,49,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Avatar ──────────────────────────────────────────── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 22px;
    }

    /* Spinning gradient ring */
    .avatar-wrap::before {
      content: '';
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--red) 0deg, transparent 100deg,
        var(--red) 200deg, transparent 300deg,
        var(--red) 360deg
      );
      animation: spin 8s linear infinite;
      opacity: 0.55;
    }

    /* Mask ring gap */
    .avatar-wrap::after {
      content: '';
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: var(--bg);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar {
      position: relative; z-index: 1;
      width: 116px; height: 116px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      transition: transform var(--t-mid) var(--ease);
    }

    .avatar-wrap:hover .avatar { transform: scale(1.04); }

    /* Online indicator */
    .status-dot {
      position: absolute;
      bottom: 4px; right: 4px;
      z-index: 2;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--bg);
      box-shadow: 0 0 10px var(--green-glow);
      animation: statusPulse 2.4s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%,100% { box-shadow: 0 0 6px 0 var(--green-glow); }
      50%     { box-shadow: 0 0 14px 4px var(--green-glow); }
    }

    /* ── Name & Handle ───────────────────────────────────── */
    .profile-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: 0 2px 28px var(--red-glow);
      margin-bottom: 6px;
    }

    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--red-dim);
      border: 1px solid rgba(214,48,49,0.22);
      border-radius: var(--r-pill);
      padding: 3px 10px 3px 8px;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 26px;
    }

    .profile-badge i { font-size: 0.55rem; }



    /* ── Main Instagram Pill ────────────────────────────── */
    .insta-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      padding: 10px 16px;
      text-decoration: none;
      color: inherit;
      margin-bottom: 20px;
      transition:
        background   var(--t-mid) var(--ease),
        border-color var(--t-mid) var(--ease),
        transform    var(--t-mid) var(--ease),
        box-shadow   var(--t-mid) var(--ease);
    }

    .insta-pill:hover {
      background: var(--surface-hov);
      border-color: var(--border-hov);
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
    }

    .insta-pill:active { transform: scale(0.97); }

    .pill-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
    }

    .pill-text { text-align: left; flex: 1; min-width: 0; }
    .pill-text strong { font-size: 0.82rem; font-weight: 500; color: var(--text); display: block; }
    .pill-text small  { font-size: 0.60rem; color: var(--text-dim); letter-spacing: 1.3px; text-transform: uppercase; }

    .pill-ig-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.75rem;
      color: #fff;
    }

    /* ── Social Icon Grid ────────────────────────────────── */
    .section-label {
      font-size: 0.58rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dimmer);
      margin-bottom: 12px;
      font-weight: 400;
    }

    .icon-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .icon-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 62px;
      padding: 12px 6px;
      border-radius: var(--r-btn);
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 1.1rem;
      text-decoration: none;
      cursor: pointer;
      opacity: 0.55;
      transition:
        opacity      var(--t-mid) var(--ease),
        background   var(--t-mid) var(--ease),
        border-color var(--t-mid) var(--ease),
        transform    var(--t-mid) var(--ease),
        box-shadow   var(--t-mid) var(--ease);
      position: relative;
    }

    .icon-btn span {
      font-size: 0.50rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }

    .icon-btn img { width: 20px; height: 20px; filter: invert(1); display: block; }

    .icon-btn:hover, .icon-btn:focus-visible {
      opacity: 1;
      transform: translateY(-6px);
      background: var(--surface-hov);
      border-color: var(--border-hov);
      box-shadow: 0 14px 32px rgba(0,0,0,0.55);
      outline: none;
    }

    .icon-btn:active { transform: scale(0.88); opacity: 0.8; }

    /* Specific icon accent colours on hover */
    .icon-btn.ig:hover  { border-color: rgba(220,39,67,0.4);  box-shadow: 0 14px 32px rgba(220,39,67,0.18); }
    .icon-btn.tt:hover  { border-color: rgba(255,255,255,0.25); }
    .icon-btn.dc:hover  { border-color: rgba(88,101,242,0.5); box-shadow: 0 14px 32px rgba(88,101,242,0.18); }
    .icon-btn.rb:hover  { border-color: rgba(255,50,50,0.4);  box-shadow: 0 14px 32px rgba(255,50,50,0.15); }

    /* ── Divider ─────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 24px 0;
    }

    /* ══════════════════════════════════════════════════════════
       MUSIC PLAYER — DOCKED BOTTOM
    ══════════════════════════════════════════════════════════ */
    .player {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 0px);
      left: 50%;
      transform: translateX(-50%) translateY(calc(100% + 24px));
      width: min(var(--player-w), 96vw);
      z-index: 200;
      background: rgba(8,8,11,0.94);
      backdrop-filter: blur(var(--blur)) saturate(150%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(150%);
      border: 1px solid rgba(29,185,84,0.12);
      border-radius: var(--r-player) var(--r-player) 0 0;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow:
        0 0 0 0.5px rgba(29,185,84,0.06) inset,
        0 -2px 0 rgba(29,185,84,0.06) inset,
        0 -40px 100px rgba(0,0,0,0.92),
        0 0 60px rgba(29,185,84,0.04);
      transition: transform var(--t-slow) var(--ease);
      will-change: transform;
    }

    .player.open {
      transform: translateX(-50%) translateY(0);
      bottom: 0;
    }

    /* Mini drag handle */
    .player-handle {
      width: 36px; height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      margin: 0 auto;
      cursor: grab;
      flex-shrink: 0;
    }

    /* Track row */
    .player-track {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-thumb {
      width: 48px; height: 48px;
      border-radius: 10px;
      object-fit: contain;
      padding: 8px;
      background: #0a0a0e;
      border: 1px solid rgba(29,185,84,0.13);
      flex-shrink: 0;
    }

    .player-meta { flex: 1; min-width: 0; }

    .player-title {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      max-width: 100%;
    }

    .player-sub {
      font-size: 0.60rem;
      color: rgba(29,185,84,0.55);
      display: block;
      margin-top: 2px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* Favourite / like btn */
    .fav-btn {
      background: none; border: none;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 6px;
      flex-shrink: 0;
      transition: color var(--t-fast), transform var(--t-fast) var(--ease);
    }
    .fav-btn.active { color: var(--red); }
    .fav-btn:hover  { transform: scale(1.25); }
    .fav-btn:active { transform: scale(0.85); }

    /* Progress */
    .player-progress { display: flex; flex-direction: column; gap: 6px; }

    .prog-bar {
      position: relative;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      cursor: pointer;
    }

    .prog-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, #16a34a, var(--green));
      border-radius: 4px;
      pointer-events: none;
      transition: width 0.25s linear;
    }

    /* Thumb knob appears on hover/touch */
    .prog-knob {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--t-fast);
    }

    .prog-bar:hover .prog-knob,
    .prog-bar.dragging .prog-knob { opacity: 1; }

    .prog-range {
      position: absolute;
      inset: -12px 0;
      width: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .prog-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.56rem;
      color: rgba(255,255,255,0.22);
    }

    /* Controls */
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ctrl-group { display: flex; align-items: center; gap: 16px; }

    .ctrl-btn {
      background: none; border: none;
      color: var(--green);
      font-size: 0.88rem;
      cursor: pointer;
      opacity: 0.60;
      padding: 6px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity var(--t-fast), transform var(--t-fast) var(--ease);
    }

    .ctrl-btn:hover { opacity: 1; transform: scale(1.2); }
    .ctrl-btn:active { transform: scale(0.80); }

    .ctrl-btn.play {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--green-dim);
      border: 1px solid rgba(29,185,84,0.24);
      box-shadow: 0 0 20px var(--green-glow);
      font-size: 1rem;
      opacity: 1;
    }
    .ctrl-btn.play:hover { background: rgba(29,185,84,0.22); }

    .ctrl-btn.shuffle.active,
    .ctrl-btn.repeat.active { opacity: 1; color: var(--green); }

    /* Volume slider */
    .vol-row { display: flex; align-items: center; gap: 8px; }
    .vol-row i { color: rgba(255,255,255,0.25); font-size: 0.62rem; }

    .vol-range {
      -webkit-appearance: none; appearance: none;
      width: 70px; height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.09);
      cursor: pointer;
      accent-color: var(--green);
    }
    .vol-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      cursor: pointer;
      box-shadow: 0 0 6px var(--green-glow);
    }

    /* ══════════════════════════════════════════════════════════
       TOAST NOTIFICATION
    ══════════════════════════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: var(--text);
      padding: 9px 22px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      opacity: 0;
      font-size: 0.74rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9000;
      transition: opacity var(--t-mid) var(--ease), transform var(--t-mid) var(--ease);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════════════════════════
       FOOTER WATERMARK
    ══════════════════════════════════════════════════════════ */
    .footer-mark {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.50rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dimmer);
      z-index: 5;
      pointer-events: none;
      opacity: 0.5;
    }

    /* ══════════════════════════════════════════════════════════
       MOBILE — full responsive
    ══════════════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      :root {
        --card-w: 100%;
        --player-w: 100%;
      }

      .page-wrap { padding: 12px 0 170px; }

      .card {
        border-radius: 28px;
        padding: 42px 18px 30px;
        margin: 0 10px;
        width: calc(100% - 20px);
      }

      .avatar { width: 100px; height: 100px; }
      .profile-name { font-size: 1.7rem; letter-spacing: 5px; }

      .player {
        border-radius: var(--r-player) var(--r-player) 0 0;
        padding: 14px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      }

      #toast { bottom: 135px; }
      .footer-mark { display: none; }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .profile-name { font-size: 1.45rem; letter-spacing: 3px; }
      .icon-btn { width: 54px; }
      .stats-row { gap: 0; }
    }

    /* Landscape mobile */
    @media (max-height: 560px) and (orientation: landscape) {
      .page-wrap { padding: 8px 0 130px; }
      .avatar { width: 80px; height: 80px; }
      .avatar-wrap { margin-bottom: 14px; }
      .profile-name { font-size: 1.4rem; margin-bottom: 4px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

      <!-- Main Instagram CTA -->

        <img id="av-pill"

  <!-- ═══════════════════════════════════════════════════════
       MUSIC PLAYER
  ═══════════════════════════════════════════════════════ -->
  <aside class="player" id="player" aria-label="Player de música">

    <div class="player-handle" aria-hidden="true"></div>

    <!-- Track info row -->
    <div class="player-track">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg"
           alt="Spotify" class="player-thumb"
           onerror="this.style.display='none'" />
      <div class="player-meta">
        <span class="player-title" id="p-title">Carregando…</span>

    <!-- Progress bar -->
    <div class="player-progress">
      <div class="prog-bar" id="prog-bar">
        <div class="prog-fill" id="prog-fill"></div>
        <div class="prog-knob" id="prog-knob"></div>
        <input type="range" class="prog-range" id="prog-range"
               min="0" max="100" value="0"

               aria-label="Posição da música" />

    <!-- Controls + Volume -->
    <div class="player-controls">
      <div class="ctrl-group">

        <i class="fas fa-volume-low" aria-hidden="true"></i>

  </aside>

  <!-- Toast -->
  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Footer -->
  <p class="footer-mark" aria-hidden="true">VkBoyzão · 2025</p>

  <!-- Hidden audio element -->
  <audio id="audio" preload="metadata"></audio>


  <script>
  'use strict';

  /* ══════════════════════════════════════════════════════════
     1. PARTICLES
  ══════════════════════════════════════════════════════════ */
  (function () {
    const cv  = document.getElementById('canvas');
    const ctx = cv.getContext('2d');
    const mx  = { x: -9999, y: -9999 };
    const N   = 120, LINK = 90;
    let W, H, pts = [];

    const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };

    class Pt {
      constructor(init) {
        this.reset(init);
      }
      reset(init) {
        this.x  = Math.random() * (W || 800);
        this.y  = init ? Math.random() * (H || 600) : (H || 600) + 4;
        this.r  = Math.random() * 1.4 + 0.3;
        this.sp = Math.random() * 0.22 + 0.06;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = -this.sp;
        this.ba = Math.random() * 0.42 + 0.07;
        this.al = this.ba;
        this.warm = Math.random() < 0.13;
      }
      tick() {
        const dx = this.x - mx.x, dy = this.y - mx.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < 7000) {
          const d = Math.sqrt(d2), f = ((84 - d) / 84) * 0.1;
          this.vx += (dx / d) * f;
          this.vy += (dy / d) * f;
        }
        this.vx *= 0.993; this.vy *= 0.993;
        this.x += this.vx; this.y += this.vy;
        if (this.x < -4) this.x = W + 4;
        if (this.x > W + 4) this.x = -4;
        if (this.y < -4) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, 6.283);
        ctx.fillStyle = this.warm
          ? `rgba(220,70,70,${this.al})`
          : `rgba(190,195,215,${this.al})`;
        ctx.fill();
      }
    }

    function links() {
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const a = pts[i], b = pts[j];
          const d2 = (a.x - b.x) ** 2 + (a.y - b.y) ** 2;
          if (d2 < LINK * LINK) {
            const al = (1 - Math.sqrt(d2) / LINK) * 0.052;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(190,195,215,${al})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function frame() {
      ctx.clearRect(0, 0, W, H);
      links();
      pts.forEach(p => { p.tick(); p.draw(); });
      requestAnimationFrame(frame);
    }

    resize();
    pts = Array.from({ length: N }, (_, i) => new Pt(i < N));
    frame();

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mx.x = e.clientX; mx.y = e.clientY; });
    window.addEventListener('touchmove', e => {
      mx.x = e.touches[0].clientX; mx.y = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchend', () => { mx.x = -9999; mx.y = -9999; });
  })();


  /* ══════════════════════════════════════════════════════════
     2. AVATAR — local file, no fallback needed
  ══════════════════════════════════════════════════════════ */


  /* ══════════════════════════════════════════════════════════
     3. TOAST
  ══════════════════════════════════════════════════════════ */
  const Toast = (() => {
    const el = document.getElementById('toast');
    let t;
    return {
      show(msg, dur = 2600) {
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(t);
        t = setTimeout(() => el.classList.remove('show'), dur);
      }
    };
  })();


  /* ══════════════════════════════════════════════════════════
     4. MUSIC PLAYER
  ══════════════════════════════════════════════════════════ */
  const Player = (() => {

    const PLAYLIST = [
      { title: 'DIÁRIO DE UM CAFAJESTE', file: 'diario de um cafajeste.mp3' },
      { title: 'Notion (Sped Up)',        file: 'musicavk.mp3'              },
    ];

    const audio   = document.getElementById('audio');
    const playerEl = document.getElementById('player');

    const pTitle  = document.getElementById('p-title');
    const playIcon = document.getElementById('play-icon');
    const progFill = document.getElementById('prog-fill');
    const progKnob = document.getElementById('prog-knob');
    const progRange = document.getElementById('prog-range');
    const progBar  = document.getElementById('prog-bar');
    const tCur    = document.getElementById('t-cur');
    const tTot    = document.getElementById('t-tot');
    const volRange = document.getElementById('vol-range');
    const favBtn  = document.getElementById('fav-btn');
    const btnPlay = document.getElementById('btn-play');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const btnShuffle = document.getElementById('btn-shuffle');
    const btnRepeat  = document.getElementById('btn-repeat');

    let cur = 0;
    let seeking = false;
    let shuffled = false;
    let repeated = false;
    let favs = new Set();

    const fmt = s => isNaN(s)
      ? '0:00'
      : `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;

    function syncProgress(pct) {
      const p = Math.max(0, Math.min(100, pct));
      progFill.style.width = `${p}%`;
      progKnob.style.left  = `${p}%`;
      progRange.value      = p;
    }

    function setPlayIcon(playing) {
      playIcon.className = playing ? 'fas fa-pause' : 'fas fa-play';
      btnPlay.setAttribute('aria-label', playing ? 'Pausar' : 'Tocar');
    }

    function updateFav() {
      favBtn.classList.toggle('active', favs.has(cur));
    }

    function load(idx, autoplay = true) {
      cur = ((idx % PLAYLIST.length) + PLAYLIST.length) % PLAYLIST.length;
      const song = PLAYLIST[cur];
      audio.src = song.file;
      pTitle.textContent = song.title;
      syncProgress(0);
      tCur.textContent = '0:00';
      tTot.textContent = '0:00';
      updateFav();
      if (autoplay) {
        audio.play()
          .then(() => setPlayIcon(true))
          .catch(e => { console.warn('Playback blocked:', e); setPlayIcon(false); });
      }
    }

    function toggle() {
      if (audio.paused) {
        audio.play().then(() => setPlayIcon(true)).catch(() => {});
      } else {
        audio.pause();
        setPlayIcon(false);
      }
    }

    function nextTrack() {
      const idx = shuffled
        ? Math.floor(Math.random() * PLAYLIST.length)
        : cur + 1;
      load(idx);
    }

    function prevTrack() {
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
      } else {
        load(cur - 1);
      }
    }

    /* Audio events */
    audio.addEventListener('timeupdate', () => {
      if (seeking || !audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      syncProgress(pct);
      tCur.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      tTot.textContent = fmt(audio.duration);
    });

    audio.addEventListener('ended', () => {
      if (repeated) { audio.currentTime = 0; audio.play(); }
      else nextTrack();
    });

    audio.addEventListener('play',  () => setPlayIcon(true));
    audio.addEventListener('pause', () => setPlayIcon(false));

    /* Progress drag / tap */
    let dragPct = null;

    function getProgPct(e) {
      const touch = e.touches ? e.touches[0] : e;
      const { left, width } = progBar.getBoundingClientRect();
      return Math.max(0, Math.min(100, ((touch.clientX - left) / width) * 100));
    }

    progBar.addEventListener('mousedown', e => {
      if (e.target === progRange) return;
      seeking = true;
      progBar.classList.add('dragging');
      dragPct = getProgPct(e);
      syncProgress(dragPct);
    });

    progBar.addEventListener('touchstart', e => {
      seeking = true;
      progBar.classList.add('dragging');
      dragPct = getProgPct(e);
      syncProgress(dragPct);
    }, { passive: true });

    window.addEventListener('mousemove', e => {
      if (!seeking) return;
      dragPct = getProgPct(e);
      syncProgress(dragPct);
      if (audio.duration) tCur.textContent = fmt((dragPct / 100) * audio.duration);
    });

    window.addEventListener('touchmove', e => {
      if (!seeking) return;
      dragPct = getProgPct(e);
      syncProgress(dragPct);
      if (audio.duration) tCur.textContent = fmt((dragPct / 100) * audio.duration);
    }, { passive: true });

    function endSeek() {
      if (!seeking) return;
      seeking = false;
      progBar.classList.remove('dragging');
      if (audio.duration && dragPct !== null) {
        audio.currentTime = (dragPct / 100) * audio.duration;
      }
      dragPct = null;
    }

    window.addEventListener('mouseup', endSeek);
    window.addEventListener('touchend', endSeek);

    /* Range input fallback */
    progRange.addEventListener('input', () => {
      syncProgress(progRange.value);
      if (audio.duration) tCur.textContent = fmt((progRange.value / 100) * audio.duration);
    });
    progRange.addEventListener('change', () => {
      if (audio.duration) audio.currentTime = (progRange.value / 100) * audio.duration;
    });

    /* Buttons */
    btnPlay.addEventListener('click', toggle);
    btnNext.addEventListener('click', nextTrack);
    btnPrev.addEventListener('click', prevTrack);

    btnShuffle.addEventListener('click', () => {
      shuffled = !shuffled;
      btnShuffle.classList.toggle('active', shuffled);
      btnShuffle.setAttribute('aria-pressed', shuffled);
      Toast.show(shuffled ? 'Aleatório ativado 🔀' : 'Aleatório desativado');
    });

    btnRepeat.addEventListener('click', () => {
      repeated = !repeated;
      btnRepeat.classList.toggle('active', repeated);
      btnRepeat.setAttribute('aria-pressed', repeated);
      Toast.show(repeated ? 'Repetindo música 🔁' : 'Repetição desativada');
    });

    favBtn.addEventListener('click', () => {
      if (favs.has(cur)) { favs.delete(cur); Toast.show('Removido dos favoritos'); }
      else                { favs.add(cur);    Toast.show('Adicionado aos favoritos ❤️'); }
      updateFav();
    });

    /* Volume */
    audio.volume = 0.5;
    volRange.addEventListener('input', () => { audio.volume = parseFloat(volRange.value); });

    /* Keyboard media keys */
    document.addEventListener('keydown', e => {
      if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key === ' ') { e.preventDefault(); toggle(); }
      if (e.key === 'ArrowRight') { audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); }
      if (e.key === 'ArrowLeft')  { audio.currentTime = Math.max(0, audio.currentTime - 5); }
      if (e.key === 'ArrowUp')    { audio.volume = Math.min(1, audio.volume + 0.1); volRange.value = audio.volume; }
      if (e.key === 'ArrowDown')  { audio.volume = Math.max(0, audio.volume - 0.1); volRange.value = audio.volume; }
    });

    return {
      start() {
        playerEl.classList.add('open');
        load(0, true);
      }
    };
  })();


  /* ══════════════════════════════════════════════════════════
     5. ENTRY OVERLAY
  ══════════════════════════════════════════════════════════ */
  (function () {
    const overlay = document.getElementById('entry');

    function launch() {
      overlay.classList.add('gone');
      Player.start();
    }

    overlay.addEventListener('click', launch);
    overlay.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); launch(); }
    });
  })();


  /* ══════════════════════════════════════════════════════════
     6. DISCORD COPY
  ══════════════════════════════════════════════════════════ */
  document.getElementById('discord-btn').addEventListener('click', async () => {
    const tag = 'itoraphael';
    try {
      await navigator.clipboard.writeText(tag);
      Toast.show('Discord copiado! 🎮');
    } catch {
      /* Fallback for iOS */
      const ta = document.createElement('textarea');
      ta.value = tag;
      ta.style.cssText = 'position:fixed;opacity:0;';
      document.body.appendChild(ta);
      ta.select(); ta.setSelectionRange(0, 99);
      try { document.execCommand('copy'); Toast.show('Discord copiado! 🎮'); }
      catch { Toast.show('Discord: ' + tag); }
      document.body.removeChild(ta);
    }
  });


  /* ══════════════════════════════════════════════════════════
     7. TAB TITLE BLINK
  ══════════════════════════════════════════════════════════ */
  (function () {
    const orig = document.title;
    let blink;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        let on = true;
        blink = setInterval(() => {
          document.title = on ? '👀 Ei! Volta aqui —' : orig;
          on = !on;
        }, 1200);
      } else {
        clearInterval(blink);
        document.title = orig;
      }
    });
  })();

  </script>
