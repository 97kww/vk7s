<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>



        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* TELA DE INÍCIO COM DESFOQUE */
        #entry-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #entry-overlay h2 {
            color: #fff;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.98); }
        }

        .bg-animated {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, #000000, #853a3a, #4e3a3a, #201e1e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            z-index: 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 0, 0, 0.05) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 50px 25px;
            width: 360px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .avatar {
            width: 105px; height: 105px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            object-fit: cover;
        }

        h1 { color: #fff; font-weight: 200; font-size: 2rem; letter-spacing: 6px; margin-bottom: 35px; }

        .discord-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 40px;
        }

        .discord-pill img { width: 38px; height: 38px; border-radius: 50%; }
        .discord-txt { text-align: left; }
        .discord-txt b { color: #ffffff; font-size: 0.85rem; display: block; }
        .discord-txt span { color: rgba(255,255,255,0.25); font-size: 0.65rem; text-transform: uppercase; }

        .icon-container { display: flex; justify-content: center; gap: 22px; }
        .icon-link { color: #fff; opacity: 0.4; transition: 0.3s; font-size: 1.6rem; text-decoration: none; }
        .icon-link:hover { opacity: 1; transform: translateY(-3px); }

        .spotify-mini {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(35, 252, 15, 0.1);
            border-radius: 16px;
            padding: 12px;
            width: 280px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mini-info { display: flex; align-items: center; gap: 10px; }
        .mini-img { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; }
        .mini-text b { color: #ffffff; font-size: 0.8rem; display: block; }
        .mini-text span { color: #7e7d7d; font-size: 0.7rem; }

        .mini-controls { display: flex; align-items: center; justify-content: space-between; }
        .control-btns { display: flex; gap: 15px; color: #0cdf1d; align-items: center; }
        .btn { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .btn:hover { opacity: 1; }
        
        .vol-box { display: flex; align-items: center; gap: 8px; width: 80px; }
        .vol-slider { width: 100%; height: 3px; cursor: pointer; accent-color: #2cd30a; }

        #toast {
            position: fixed; bottom: 40px; background: rgba(255,255,255,0.1);
            color: #fff; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: 0.5s;
            left: 50%; transform: translateX(-50%); z-index: 100; font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="bg-animated"></div>

    <div class="profile-card">

    <div class="discord-txt">
        <b>Siga no Instagram</b>
        <span>@knt26k</span>
    </div>
</a>

        <div class="icon-container">
            <a href="https://www.instagram.com/off.f26k/" target="_blank" class="icon-link"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@ferreira_25k____" target="_blank" class="icon-link"><i class="fab fa-tiktok"></i></a>
            <a href="javascript:void(0)" onclick="copyDiscord()" class="icon-link"><i class="fab fa-discord"></i></a>
            <a href="https://www.roblox.com/users/9482967866/profile" target="_blank" class="icon-link">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="width:22px; filter:invert(1)">
            </a>

    <div class="spotify-mini">
        <div class="mini-info">
            <img src="Spotify-Logo-Transparent-File.webp" class="mini-img">
            <div class="mini-text">
                <b id="m-title">Música 1</b>
                <span>KnRichBoy Playlist</span>
            </div>
        </div>
        <div class="mini-controls">
            <div class="control-btns">
                <i class="fas fa-step-backward btn" onclick="prev()"></i>
                <i class="fas fa-play btn" id="p-icon" onclick="toggle()"></i>
                <i class="fas fa-step-forward btn" onclick="next()"></i>
            </div>
            <div class="vol-box">
                <i class="fas fa-volume-down" style="color:#fff; font-size:0.7rem"></i>
                <input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.5" oninput="setVol(this.value)">
            </div>
        </div>
    </div>

    <div id="toast">Discord copiado</div>
    <audio id="player"></audio>

    <script>
        const audio = document.getElementById('player');
        const pIcon = document.getElementById('p-icon');
        const mTitle = document.getElementById('m-title');
        let index = 0;

        const songs = [
            { n: "DIÁRIO DE UM CAFAJESTE", f: "diario de um cafajeste.mp3" }
            
        ];

        function load(i) {
            audio.src = songs[i].f;
            mTitle.innerText = songs[i].n;
        }

        // FUNÇÃO PARA INICIAR O SITE E DESBORRAR
        function startExperience() {
            const overlay = document.getElementById('entry-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
            }, 800);

            // Inicia a música
            load(0);
            audio.play().then(() => {
                pIcon.className = "fas fa-pause btn";
            }).catch(e => console.log("Erro ao tocar:", e));
        }

        function toggle() {
            if (audio.paused) {
                audio.play().then(() => {
                    pIcon.className = "fas fa-pause btn";
                }).catch(() => {
                    alert("Clique em qualquer lugar da tela e tente o Play novamente!");
                });
            } else {
                audio.pause();
                pIcon.className = "fas fa-play btn";
            }
        }

        function next() { 
            index = (index + 1) % songs.length; 
            load(index); 
            audio.play(); 
            pIcon.className = "fas fa-pause btn"; 
        }

        function prev() { 
            index = (index - 1 + songs.length) % songs.length; 
            load(index); 
            audio.play(); 
            pIcon.className = "fas fa-pause btn"; 
        }

        function setVol(v) { audio.volume = v; }

        function copyDiscord() {
            navigator.clipboard.writeText("itoraphael");
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        // Removi o load(0) automático aqui para ele ser chamado só no clique inicial
        audio.volume = 0.5;
    </script>
</body>
</html>
